[build]
  command = "pnpm build"
  publish = "dist"
  ignore = "bash -c 'if [ \"$BRANCH\" = \"main\" ] && git log -1 --pretty=%B | grep -iqE \"\\\\[release\\\\]|\\\\[feature release\\\\]|\\\\[deploy\\\\]|\\\\[major\\\\]\"; then exit 1; else exit 0; fi'"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/storage-proxy/*"
  to = "https://oxqpmfdoytdfxmofmeno.supabase.co/storage/v1/object/public/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
